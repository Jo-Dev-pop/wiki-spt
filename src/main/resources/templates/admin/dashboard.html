<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Wiki-SPT</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                <img th:src="@{/images/logo-poste.png}" width="70">

                <h4>Wiki-SPT</h4>

            </div>

            <nav>

                <a th:href="@{/admin/dashboard}" class="sidebar-link">

                    <i class="bi bi-speedometer2"></i>

                    Tableau de bord

                </a>

                <a th:href="@{/admin/utilisateurs}" class="sidebar-link">

                    <i class="bi bi-people-fill"></i>

                    Utilisateurs

                </a>

                <a th:href="@{/admin/articles}" class="sidebar-link">

                    <i class="bi bi-journal-text"></i>

                    Articles

                </a>

                <a th:href="@{/admin/categories}"
                   class="sidebar-link">

                    <i class="bi bi-tags"></i>

                    Catégories

                </a>

                <a th:href="@{/admin/notifications}" class="sidebar-link position-relative">
                    <i class="bi bi-bell-fill"></i>
                    Notifications
                    <span th:if="${notificationsNonLues > 0}"
                          class="badge bg-danger rounded-pill ms-1"
                          th:text="${notificationsNonLues}">0</span>
                </a>

                <a th:href="@{/admin/historique}" class="sidebar-link">

                    <i class="bi bi-clock-history"></i>

                    Historique

                </a>

            </nav>

        </div>

        <div>

            <hr>

            <p class="text-white mb-1">
                <i class="bi bi-person-circle"></i>
                <span th:text="${utilisateurConnecte.prenom} + ' ' + ${utilisateurConnecte.nom}">Administrateur</span>
            </p>
            <small class="text-white-50" th:text="${utilisateurConnecte.role}">ADMINISTRATEUR</small>

            <form th:action="@{/logout}" method="post">

                <button class="btn btn-warning w-100">

                    <i class="bi bi-box-arrow-right"></i>

                    Déconnexion

                </button>

            </form>

        </div>

    </aside>

    <!-- Contenu -->

    <main class="content">

        <div th:replace="${content}"></div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
