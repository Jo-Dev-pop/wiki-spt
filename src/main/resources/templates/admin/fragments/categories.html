<div class="card shadow-sm">

    <div class="card-header d-flex justify-content-between align-items-center">

        <h5 class="mb-0">
            Gestion des catégories
        </h5>

        <a th:href="@{/admin/categories/nouveau}"
           class="btn btn-warning">

            <i class="bi bi-plus-circle"></i>
            Nouvelle catégorie

        </a>

    </div>

    <div class="card-body">

        <table class="table table-hover align-middle">

            <thead>

            <tr>

                <th>Nom</th>
                <th>Description</th>
                <th>Catégorie parente</th>
                <th>Actions</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="categorie : ${pageCategories.content}">

                <td th:text="${categorie.nom}"></td>

                <td th:text="${categorie.description}"></td>

                <td>

    <span th:if="${categorie.parentNom != null}"
          th:text="${categorie.parentNom}">
    </span>

                    <span th:if="${categorie.parentNom == null}">
        —
    </span>

                </td>

                <td>

                    <a class="btn btn-sm btn-primary"
                       th:href="@{'/admin/categories/modifier/' + ${categorie.id}}">

                        <i class="bi bi-pencil"></i>

                    </a>

                    <a class="btn btn-sm btn-danger"
                       th:href="@{'/admin/categories/supprimer/' + ${categorie.id}}"
                       onclick="return confirm('Supprimer cette catégorie ?')">

                        <i class="bi bi-trash"></i>

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>
