<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2>Gestion des utilisateurs</h2>

        <p class="text-muted">
            Gérez les comptes des utilisateurs de Wiki-SPT.
        </p>

    </div>

    <a th:href="@{/admin/utilisateurs/nouveau}"
       class="btn btn-warning">

        <i class="bi bi-plus-circle"></i>

        Ajouter un utilisateur

    </a>

</div>

<div class="card">

    <div class="card-body">

        <div th:if="${success}"
             class="alert alert-success alert-dismissible fade show">

            <i class="bi bi-check-circle-fill"></i>

            <span th:text="${success}"></span>

            <button class="btn-close"
                    data-bs-dismiss="alert">
            </button>

        </div>

        <div th:if="${error}"
             class="alert alert-danger alert-dismissible fade show">

            <i class="bi bi-exclamation-triangle-fill"></i>

            <span th:text="${error}"></span>

            <button class="btn-close"
                    data-bs-dismiss="alert">
            </button>

        </div>

        <div class="card mb-4 shadow-sm">

            <div class="card-body">

                <form th:action="@{/admin/utilisateurs}"
                      method="get">

                    <div class="input-group">

                        <input
                                type="text"
                                class="form-control"
                                name="motCle"
                                th:value="${motCle}"
                                placeholder="Rechercher par nom, prénom ou email">

                        <button class="btn btn-warning">

                            <i class="bi bi-search"></i>

                            Rechercher

                        </button>

                        <a th:href="@{/admin/utilisateurs}"
                           class="btn btn-secondary">

                            Réinitialiser

                        </a>

                    </div>

                </form>

            </div>

        </div>

        <table class="table table-hover align-middle">

            <thead>

            <tr>

                <th>Nom</th>

                <th>Prénom</th>

                <th>Email</th>

                <th>Rôle</th>

                <th>Statut</th>

                <th class="text-center">Actions</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="utilisateur : ${pageUtilisateurs.content}">

                <td th:text="${utilisateur.nom}"></td>

                <td th:text="${utilisateur.prenom}"></td>

                <td th:text="${utilisateur.email}"></td>

                <td th:text="${utilisateur.role}"></td>

                <td>
                    <span class="badge bg-success"
                          th:text="${utilisateur.statut}">
                    </span>
                </td>

                <td>

                    <a th:href="@{/admin/utilisateurs/modifier/{id}(id=${utilisateur.id})}"
                       class="btn btn-sm btn-primary">
                        <i class="bi bi-pencil-square"></i>
                        Modifier
                    </a>

                    <a th:if="${utilisateur.statut.name() == 'ACTIF'}"
                       th:href="@{/admin/utilisateurs/desactiver/{id}(id=${utilisateur.id})}"
                       class="btn btn-sm btn-warning"
                       onclick="return confirm('Voulez-vous vraiment désactiver cet utilisateur ?');">
                        <i class="bi bi-lock-fill"></i>
                        Désactiver
                    </a>

                    <a th:if="${utilisateur.statut.name() == 'BLOQUE'}"
                       th:href="@{/admin/utilisateurs/reactiver/{id}(id=${utilisateur.id})}"
                       class="btn btn-sm btn-success"
                       onclick="return confirm('Réactiver cet utilisateur ?');">
                        <i class="bi bi-unlock-fill"></i>
                        Réactiver
                    </a>

                </td>
            </tr>

            </tbody>

        </table>

        <nav class="mt-4">

            <ul class="pagination justify-content-center">

                <li class="page-item"
                    th:classappend="${pageUtilisateurs.first} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/admin/utilisateurs(page=${pageUtilisateurs.number-1})}">
                        Précédent
                    </a>

                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0,pageUtilisateurs.totalPages-1)}"
                    th:classappend="${i==pageUtilisateurs.number}? 'active'">

                    <a class="page-link"
                       th:text="${i+1}"
                       th:href="@{/admin/utilisateurs(page=${i})}">
                    </a>

                </li>

                <li class="page-item"
                    th:classappend="${pageUtilisateurs.last} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/admin/utilisateurs(page=${pageUtilisateurs.number+1})}">
                        Suivant
                    </a>

                </li>

            </ul>

        </nav>

    </div>

</div>
