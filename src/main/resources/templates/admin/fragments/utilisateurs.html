<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2>Gestion des utilisateurs</h2>

        <p class="text-muted">
            Gérez les comptes des utilisateurs de Wiki-SPT.
        </p>

    </div>

    <a th:href="@{/admin/utilisateurs/nouveau}"
       class="btn btn-warning">

        <i class="bi bi-plus-circle"></i>

        Ajouter un utilisateur

    </a>

</div>

<div class="card">

    <div class="card-body">

        <table class="table table-hover align-middle">

            <thead>

            <tr>

                <th>Nom</th>

                <th>Prénom</th>

                <th>Email</th>

                <th>Rôle</th>

                <th>Statut</th>

                <th class="text-center">Actions</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="utilisateur : ${utilisateurs}">

                <td th:text="${utilisateur.nom}"></td>

                <td th:text="${utilisateur.prenom}"></td>

                <td th:text="${utilisateur.email}"></td>

                <td th:text="${utilisateur.role}"></td>

                <td>
                    <span class="badge bg-success"
                          th:text="${utilisateur.statut}">
                    </span>
                </td>

                <td class="text-center">

                    <a href="#" class="btn btn-sm btn-primary">
                        <i class="bi bi-pencil-square"></i>
                    </a>

                    <a href="#" class="btn btn-sm btn-secondary">
                        <i class="bi bi-lock"></i>
                    </a>

                    <a href="#" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i>
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>
